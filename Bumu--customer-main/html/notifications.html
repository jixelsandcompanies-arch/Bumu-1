<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Notifications | Bumu PayGo</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <main class="dashboard-page">
    <header class="app-header">
      <div class="menu-column">
